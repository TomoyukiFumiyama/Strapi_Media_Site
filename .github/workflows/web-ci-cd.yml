name: Web CI/CD to VPS

on:
  pull_request:
    paths:
      - 'web/**'
      - '.github/workflows/web-ci-cd.yml'
  push:
    branches:
      - main
    paths:
      - 'web/**'
      - 'docker-compose.yml'
      - '.github/workflows/web-ci-cd.yml'

jobs:
  ci:
    name: Typecheck and Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      # リポジトリのコードをRunnerへ取得する
      - name: Checkout
        uses: actions/checkout@v4

      # Node.js 22 をセットアップする
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 依存パッケージをインストールする
      - name: Install dependencies
        run: npm install

      # TypeScript の型整合性を検証する
      - name: TypeScript typecheck
        run: npm run typecheck

      # Next.js の本番ビルドが通るか確認する
      - name: Build
        run: npm run build

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      # デプロイ対象のソースをRunnerへ取得する
      - name: Checkout
        uses: actions/checkout@v4

      # VPSへリポジトリ内容を転送する
      - name: Copy repository to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          source: "."
          target: ${{ secrets.VPS_DEPLOY_PATH }}

      # VPS上でDocker Composeを再起動し反映する
      - name: Run docker compose on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          script: |
            set -eu
            cd "${{ secrets.VPS_DEPLOY_PATH }}"
            docker compose down
            docker compose up -d --build
